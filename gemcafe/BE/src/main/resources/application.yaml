spring:
  application:
    name: gemcafe-be
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/gemcafe?useUnicode=true&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false

  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379/1}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VHOST:/}

app-mq:
  exchange: ${MQ_EXCHANGE:gemcafe.exchange}
  watermark-exchange: ${MQ_WATERMARK_EXCHANGE:gemcafe.watermark.exchange}
  queue:
    video-generate: ${MQ_QUEUE_VIDEO_GENERATE:gemcafe.video.generate}
    watermark-request: ${MQ_QUEUE_WATERMARK_REQUEST:gemcafe.watermark.request}
  routing-key:
    video-generate: ${MQ_ROUTING_VIDEO_GENERATE:gemcafe.video.generate}
    watermark-request: ${MQ_ROUTING_WATERMARK_REQUEST:gemcafe.watermark.request}

app-ai:
  base-url: ${AI_BASE_URL:http://localhost:8000}
  connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:10000}
  read-timeout-ms: ${AI_READ_TIMEOUT_MS:600000}

app-video:
  subdir: ${VIDEO_SUBDIR:ai-videos}
  ffmpeg-path: ${FFMPEG_PATH:ffmpeg}

app-watermark:
  subdir: ${WATERMARK_SUBDIR:watermarked}
  alpha: ${WATERMARK_ALPHA:20}
  redis-channel-prefix: ${WATERMARK_REDIS_CHANNEL_PREFIX:watermark:progress}
  redis-job-key-prefix: ${WATERMARK_REDIS_JOB_KEY_PREFIX:watermark:job}
  redis-job-ttl-minutes: ${WATERMARK_REDIS_JOB_TTL_MINUTES:30}
  sse-timeout-ms: ${WATERMARK_SSE_TIMEOUT_MS:600000}
  source-mount-prefix: ${WATERMARK_SOURCE_MOUNT_PREFIX:/app/gemcafe-uploads}

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_PROD_min_32_chars_required_for_HS256}
  access-expire-minutes: ${JWT_ACCESS_EXPIRE_MINUTES:60}
  refresh-expire-days: ${JWT_REFRESH_EXPIRE_DAYS:7}

app:
  cookie:
    refresh-name: ${REFRESH_COOKIE_NAME:refreshToken}
    refresh-path: ${REFRESH_COOKIE_PATH:/api/v1/auth}
    secure: ${COOKIE_SECURE:true}
    same-site: ${COOKIE_SAME_SITE:Strict}
  file:
    base-url: ${FILE_BASE_URL:/dev/files/gemcafe}
    upload-dir: ${UPLOAD_DIR:/app/uploads}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /dev/be/gemcafe/v3/api-docs/swagger-config
    url: /dev/be/gemcafe/v3/api-docs
  servers:
    - url: https://k14s307.p.ssafy.io/dev/be/gemcafe
      description: dev server

server:
  port: ${SERVER_PORT:8002}
