spring:
  application:
    name: gemcafe-be
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/gemcafe?useUnicode=true&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false

  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379/1}

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_PROD_min_32_chars_required_for_HS256}
  access-expire-minutes: ${JWT_ACCESS_EXPIRE_MINUTES:60}
  refresh-expire-days: ${JWT_REFRESH_EXPIRE_DAYS:7}

app:
  cookie:
    refresh-name: ${REFRESH_COOKIE_NAME:refreshToken}
    refresh-path: ${REFRESH_COOKIE_PATH:/api/v1/auth}
    secure: ${COOKIE_SECURE:true}
    same-site: ${COOKIE_SAME_SITE:Strict}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /dev/be/gemcafe/v3/api-docs/swagger-config
    url: /dev/be/gemcafe/v3/api-docs
    servers:
      - url: https://k14s307.p.ssafy.io/dev/be/gemcafe
        description: dev server

server:
  port: ${SERVER_PORT:8002}
