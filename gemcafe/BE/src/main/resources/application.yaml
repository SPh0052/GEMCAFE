spring:
  application:
    name: gemcafe-be
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 110MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:13306/gemcafe?useUnicode=true&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false

  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379/1}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VHOST:/}

app-mq:
  exchange: ${MQ_EXCHANGE:gemcafe.exchange}
  watermark-exchange: ${MQ_WATERMARK_EXCHANGE:gemcafe.watermark.exchange}
  queue:
    video-generate: ${MQ_QUEUE_VIDEO_GENERATE:gemcafe.video.generate}
    watermark-request: ${MQ_QUEUE_WATERMARK_REQUEST:gemcafe.watermark.request}
  routing-key:
    video-generate: ${MQ_ROUTING_VIDEO_GENERATE:gemcafe.video.generate}
    watermark-request: ${MQ_ROUTING_WATERMARK_REQUEST:gemcafe.watermark.request}

app-ai:
  base-url: ${AI_BASE_URL:http://localhost:8000}
  connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:10000}
  read-timeout-ms: ${AI_READ_TIMEOUT_MS:600000}

app-video:
  subdir: ${VIDEO_SUBDIR:ai-videos}
  ffmpeg-path: ${FFMPEG_PATH:ffmpeg}

app-watermark:
  subdir: ${WATERMARK_SUBDIR:watermarked}
  alpha: ${WATERMARK_ALPHA:20}
  redis-channel-prefix: ${WATERMARK_REDIS_CHANNEL_PREFIX:watermark:progress}
  redis-job-key-prefix: ${WATERMARK_REDIS_JOB_KEY_PREFIX:watermark:job}
  redis-job-ttl-minutes: ${WATERMARK_REDIS_JOB_TTL_MINUTES:30}
  sse-timeout-ms: ${WATERMARK_SSE_TIMEOUT_MS:600000}
  source-mount-prefix: ${WATERMARK_SOURCE_MOUNT_PREFIX:/app/gemcafe-uploads}

app-gemmark:
  base-url: ${GEMMARK_BASE_URL:http://dev-gemmark-be:8000}
  connect-timeout-ms: ${GEMMARK_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${GEMMARK_READ_TIMEOUT_MS:120000}

app-uploadpost:
  base-url: ${UPLOAD_POST_BASE_URL:https://api.upload-post.com}
  api-key: ${UPLOAD_POST_API_KEY:}
  # Upload-Post 의 프로필명. 데모용 1개 계정. 사용자별 분리는 추후 작업.
  default-user: ${UPLOAD_POST_DEFAULT_USER:gemcafe-demo}
  # 워터마크된 영상 파일을 읽을 컨테이너 내부 경로 (docker-compose 마운트 결과).
  watermarked-mount: ${UPLOAD_POST_WATERMARKED_MOUNT:/app/watermarked-uploads}
  connect-timeout-ms: ${UPLOAD_POST_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${UPLOAD_POST_READ_TIMEOUT_MS:300000}

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_PROD_min_32_chars_required_for_HS256}
  access-expire-minutes: ${JWT_ACCESS_EXPIRE_MINUTES:60}
  refresh-expire-days: ${JWT_REFRESH_EXPIRE_DAYS:7}

oauth:
  google:
    # FE 의 VITE_GOOGLE_CLIENT_ID 와 반드시 동일한 값이어야 ID Token 의 aud 검증이 통과한다.
    client-id: ${GOOGLE_CLIENT_ID:}
    # 첫 가입 시 지급할 보너스 젬 (이메일 가입과 동일하게 20)
    signup-bonus-gem: ${GOOGLE_SIGNUP_BONUS_GEM:20}

app:
  cookie:
    refresh-name: ${REFRESH_COOKIE_NAME:refreshToken}
    refresh-path: ${REFRESH_COOKIE_PATH:/api/v1/auth}
    secure: ${COOKIE_SECURE:true}
    same-site: ${COOKIE_SAME_SITE:Strict}
  file:
    base-url: ${FILE_BASE_URL:/dev/files/gemcafe}
    upload-dir: ${UPLOAD_DIR:/app/uploads}
    # X-Accel-Redirect 내부 경로 prefix. DEV/PROD 가 같은 nginx 를 공유하므로 환경별로 다르게.
    # 예: DEV=/internal/dev, PROD=/internal/prod. 미설정 시 기본 /internal 사용.
    internal-prefix: ${INTERNAL_PREFIX:/internal}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    config-url: /dev/be/gemcafe/v3/api-docs/swagger-config
    url: /dev/be/gemcafe/v3/api-docs
  servers:
    - url: https://k14s307.p.ssafy.io/dev/be/gemcafe
      description: dev server

server:
  port: ${SERVER_PORT:8002}
