services:
  gemcafe-be:
    build: ./BE
    container_name: gemcafe-be
    restart: unless-stopped
    networks:
      - gemcafe-network

  gemcafe-fe:
    build: ./FE
    container_name: gemcafe-fe
    restart: unless-stopped
    networks:
      - gemcafe-network

  gemcafe-nginx:
    image: nginx:alpine
    container_name: gemcafe-nginx
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - /home/ubuntu/jenkins_home/workspace/develop-gemcafe/gemcafe/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - gemcafe-fe
      - gemcafe-be
    networks:
      - gemcafe-network

networks:
  gemcafe-network:
    driver: bridge