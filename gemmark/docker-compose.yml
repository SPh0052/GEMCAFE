services:
  gemmark-be:
    build: ./BE
    container_name: gemmark-be
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./BE/.env
    volumes:
      - /home/ubuntu/gemmark-uploads:/app/uploads
    networks:
      - gemmark-network

  gemmark-fe:
    build: ./FE
    container_name: gemmark-fe
    restart: unless-stopped
    networks:
      - gemmark-network

  gemmark-nginx:
    image: nginx:alpine
    container_name: gemmark-nginx
    restart: unless-stopped
    ports:
      - "3000:80"
      - "443:443"
    volumes:
      - /home/ubuntu/jenkins_home/workspace/develop-gemmark/gemmark/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - gemmark-fe
      - gemmark-be
    networks:
      - gemmark-network

networks:
  gemmark-network:
    driver: bridge