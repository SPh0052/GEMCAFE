server {
    listen 80;
    location VITE_BASE_PLACEHOLDER {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ VITE_BASE_PLACEHOLDERindex.html;
    }
    
    location = VITE_BASE_PLACEHOLDERindex.html {
        alias /usr/share/nginx/html/index.html;
    }
}